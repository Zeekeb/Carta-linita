
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Linita 💙</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
overflow:hidden;
}

.container{
text-align:center;
max-width:600px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
position:relative;
z-index:2;
}

img{
width:100%;
border-radius:15px;
margin-bottom:15px;
}

h2{
margin-bottom:15px;
}

button{
background:#3a7bfd;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

#letter{
display:none;
margin-top:20px;
font-size:16px;
line-height:1.6;
white-space:pre-wrap;
}

.question{
margin-top:25px;
font-size:18px;
display:none;
}

.hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:1;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}
</style>
</head>

<h2>¿2 meses ya?</h2>

<button onclick="openLetter()">Abrir carta</button>

<div id="letter"></div>

<div class="question" id="question">
<p><strong>¿Quieres seguir renovando la mensualidad?</strong></p>
<label><input type="checkbox"> Sí</label>
<label><input type="checkbox"> Sí</label>
</div>

</div>

<script>
const text = `No me arrepiento de haber ido esa vez a jugar futbol, no me arrepiento de aunque fuera un lento, querer hablarte, querer seguir conociéndote e invitarte a almorzar ese día, no me arrepiento definitivamente de ese día devolverme a casa a dejar el carro y salir contigo esa noche.

Definitivamente que estos dos meses han sido de los mejores que he podido tener en mucho tiempo y cómo no? Si tengo a la novia más hermosa, cariñosa e increíble de todas.

Cada día que pasa te extraño más pero con la certeza de que nos podremos ver y disfrutar todo lo que más podamos de ambos.

Estos solo son 2 meses pero puedes creerlo? Ya van 2 meses? Espero que sea una eternidad.

Te amo mucho Linita Marcelita 🩵`;

let i = 0;

function openLetter(){
document.getElementById("letter").style.display="block";
typeWriter();
}

function typeWriter(){
if(i < text.length){
document.getElementById("letter").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,40);
}else{
document.getElementById("question").style.display="block";
}
}

function createHeart(){
const heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*20)+"px";
heart.style.animationDuration=(4+Math.random()*3)+"s";
document.getElementById("hearts").appendChild(heart);

setTimeout(()=>{heart.remove();},6000);
}

setInterval(createHeart,300);
</script>
